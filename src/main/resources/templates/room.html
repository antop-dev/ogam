<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공감퀴즈 💕</title>
    <link rel="apple-touch-icon" sizes="57x57" th:href="@{/favicon/apple-icon-57x57.png}">
    <link rel="apple-touch-icon" sizes="60x60" th:href="@{/favicon/apple-icon-60x60.png}">
    <link rel="apple-touch-icon" sizes="72x72" th:href="@{/favicon/apple-icon-72x72.png}">
    <link rel="apple-touch-icon" sizes="76x76" th:href="@{/favicon/apple-icon-76x76.png}">
    <link rel="apple-touch-icon" sizes="114x114" th:href="@{/favicon/apple-icon-114x114.png}">
    <link rel="apple-touch-icon" sizes="120x120" th:href="@{/favicon/apple-icon-120x120.png}">
    <link rel="apple-touch-icon" sizes="144x144" th:href="@{/favicon/apple-icon-144x144.png}">
    <link rel="apple-touch-icon" sizes="152x152" th:href="@{/favicon/apple-icon-152x152.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/favicon/apple-icon-180x180.png}">
    <link rel="icon" type="image/png" sizes="192x192" th:href="@{/favicon/android-icon-192x192.png}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/favicon/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="96x96" th:href="@{/favicon/favicon-96x96.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/favicon/favicon-16x16.png}">
    <link rel="manifest" th:href="@{/favicon/manifest.json}">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" th:content="@{/favicon/ms-icon-144x144.png}">
    <meta name="theme-color" content="#ffffff">
    <!-- SEO: 게임 방은 색인 제외 -->
    <meta name="robots" content="noindex, nofollow">
    <!-- Open Graph (결과 공유용) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="공감퀴즈">
    <meta property="og:title" content="공감퀴즈 — 우리의 공감률은?">
    <meta property="og:description" content="두 사람이 10가지 질문에 답하며 공감률을 확인해보세요. 친구, 연인, 가족 누구와도 즐길 수 있어요.">
    <meta property="og:image" th:content="${baseUrl + '/img/logo.png'}">
    <meta property="og:locale" content="ko_KR">
    <script th:src="@{/js/tailwind.cdn.js}"></script>
    <link rel="stylesheet" th:href="@{/css/fontawesome.min.css}">
    <link rel="stylesheet" th:href="@{/css/noto-sans-kr.css}">
    <link rel="stylesheet" th:href="@{/css/room.css}">
    <script th:src="@{/js/qrcode.min.js}"></script>
</head>
<body class="bg-white overflow-x-hidden">

<div class="w-full min-h-[100dvh] sm:max-w-[390px] sm:mx-auto">

<!-- ===================== WAITING SCREEN ===================== -->
<section id="waitingScreen" class="hidden w-full min-h-[100dvh] flex flex-col items-center justify-center fade-in">
    <div class="w-full px-8 py-10 text-center">
        <h2 class="text-xl font-bold text-pink-600 mb-1">친구를 초대해요</h2>
        <p class="text-gray-400 text-sm mb-6">QR 코드를 스캔하면 바로 입장!</p>

        <div class="relative inline-flex justify-center mb-6 cursor-pointer" onclick="copyRoomLink()" title="링크 복사">
            <div id="qrcode"></div>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-sm">
                    <i id="qrLinkIcon" class="fa-solid fa-link text-pink-400 text-base"></i>
                </div>
            </div>
        </div>

        <div class="bg-pink-50 rounded-xl p-3 mb-6">
            <p class="text-xs text-pink-400 mb-1">방 코드</p>
            <div class="flex items-center justify-center gap-2">
                <p id="roomCodeDisplay" class="text-2xl font-bold text-pink-600 tracking-widest"></p>
                <button onclick="copyRoomCode()" class="text-pink-300 hover:text-pink-500 transition-colors" title="코드 복사">
                    <i id="codeIcon" class="fa-regular fa-copy text-lg"></i>
                </button>
            </div>
        </div>

        <div class="flex items-center justify-center gap-2 text-gray-400 text-sm pulse">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <span>상대방을 기다리는 중...</span>
        </div>
    </div>
</section>

<!-- ===================== READY SCREEN ===================== -->
<section id="readyScreen" class="hidden w-full min-h-[100dvh] flex flex-col items-center justify-center fade-in">
    <div class="w-full px-8 py-10 text-center">

        <!-- 시작하기 전 -->
        <div id="readyBefore">
            <div class="text-5xl mb-4">🎉</div>
            <h2 class="text-xl font-bold text-pink-600 mb-2">둘 다 입장했어요!</h2>
            <p class="text-gray-500 text-sm mb-8">준비되면 시작 버튼을 눌러주세요<br>둘 다 눌러야 퀴즈가 시작돼요</p>
            <button
                id="startBtn"
                class="btn-primary w-full text-white font-bold py-4 px-6 rounded-2xl text-lg"
                onclick="pressStart()"
            >
                <i class="fa-solid fa-play mr-2"></i>시작하기
            </button>
        </div>

        <!-- 시작하기 누른 후: 상대방 대기 중 -->
        <div id="readyWaiting" class="hidden">
            <div class="text-5xl mb-4">⏰</div>
            <h2 class="text-xl font-bold text-pink-600 mb-2">기다리는 중...</h2>
            <p class="text-gray-500 text-sm mb-8">상대방이 시작 버튼을 누르면<br>바로 시작돼요!</p>
            <div class="flex items-center justify-center gap-2 text-pink-400 text-sm pulse">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <span>상대방을 기다리는 중...</span>
            </div>
        </div>

    </div>
</section>

<!-- ===================== QUIZ SCREEN ===================== -->
<section id="quizScreen" class="hidden w-full fade-in">
    <div class="w-full px-6 py-6">
        <!-- Progress -->
        <div class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs text-gray-400">진행률</span>
                <span id="seqLabel" class="text-xs font-bold text-pink-500">1 / 10</span>
            </div>
            <div class="bg-gray-100 rounded-full h-2">
                <div id="progressBar" class="progress-bar bg-gradient-to-r from-pink-400 to-purple-400 h-2 rounded-full" style="width: 10%"></div>
            </div>
        </div>

        <!-- Question -->
        <div class="text-center mb-4">
            <p class="text-xs text-gray-400 mb-3">당신은 어느 쪽인가요?</p>
            <div class="flex gap-4">
                <button id="optionA"
                    class="btn-option flex-1 bg-white rounded-2xl p-4 text-center"
                    onclick="submitAnswer('A')"
                >
                    <div class="text-2xl mb-2">🅐</div>
                    <p id="optionAText" class="font-bold text-gray-700 text-sm"></p>
                </button>
                <button id="optionB"
                    class="btn-option flex-1 bg-white rounded-2xl p-4 text-center"
                    onclick="submitAnswer('B')"
                >
                    <div class="text-2xl mb-2">🅑</div>
                    <p id="optionBText" class="font-bold text-gray-700 text-sm"></p>
                </button>
            </div>
        </div>

        <!-- 선택 불가 안내 -->
        <p class="text-xs text-gray-400 text-center mb-3">
            <i class="fa-solid fa-lock mr-1"></i>선택하면 변경할 수 없어요
        </p>

        <!-- Waiting overlay -->
        <div id="waitingOpponent" class="hidden text-center py-3 bg-purple-50 rounded-xl">
            <p class="text-purple-400 text-sm pulse">
                <i class="fa-solid fa-hourglass-half mr-2"></i>상대방이 선택하는 중...
            </p>
        </div>
    </div>
</section>

<!-- ===================== RESULT SCREEN ===================== -->
<section id="resultScreen" class="hidden w-full h-[100dvh] fade-in flex flex-col">

    <!-- 상단: 공감률 -->
    <div class="px-6 pt-6 pb-4 flex-shrink-0">
        <div class="mb-2">
            <div class="flex justify-between mb-1">
                <span class="text-xs text-gray-400">0%</span>
                <span class="text-xs text-gray-400">100%</span>
            </div>
            <div class="bg-gray-100 rounded-full h-4">
                <div id="resultBar" class="result-bar bg-gradient-to-r from-pink-400 to-purple-500 h-4 rounded-full" style="width: 0%"></div>
            </div>
        </div>
        <p id="matchRateText" class="text-3xl font-bold text-pink-600 text-center">공감률 0%</p>
        <p id="matchComment" class="text-gray-500 text-sm mt-1 text-center"></p>
    </div>

    <!-- 중간: 선택 이력 (나머지 공간 채움, 스크롤) -->
    <div class="flex-1 overflow-y-auto px-6">
        <div id="answerList" class="space-y-2 pb-3"></div>
    </div>

    <!-- 하단: 버튼 -->
    <div class="flex-shrink-0 px-6 py-4 border-t border-gray-100">
        <div class="flex gap-2">
            <button onclick="playAgain()" class="flex-1 btn-primary text-white font-bold py-3 px-4 rounded-xl text-sm">
                <i class="fa-solid fa-rotate-right mr-2"></i>다시하기
            </button>
            <button onclick="openSharePopup()"
                class="w-12 h-12 btn-primary text-white rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-share-nodes"></i>
            </button>
            <a href="https://ko-fi.com/antop?hidefeed=true&widget=true" target="_blank" rel="noopener noreferrer"
                class="w-12 h-12 bg-[#FF5E5B] hover:bg-[#e04e4b] text-white rounded-xl flex items-center justify-center transition-colors">
                <i class="fa-solid fa-mug-hot"></i>
            </a>
        </div>
    </div>
</section>

<!-- ===================== SHARE POPUP ===================== -->
<div id="sharePopup" class="hidden fixed inset-0 z-50">
    <div class="absolute inset-0 bg-black/40" onclick="closeSharePopup()"></div>
    <div class="absolute bottom-0 left-0 right-0 sm:max-w-[390px] sm:mx-auto bg-white rounded-t-3xl px-6 pt-5 pb-8">
        <div class="flex justify-between items-center mb-5">
            <h3 class="font-bold text-gray-700">공유하기</h3>
            <button onclick="closeSharePopup()" class="text-gray-400 hover:text-gray-600">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        <div class="grid grid-cols-3 gap-4">
            <button onclick="copyLink()" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 rounded-full bg-pink-50 text-pink-500 flex items-center justify-center">
                    <i class="fa-solid fa-link text-xl"></i>
                </div>
                <span class="text-xs text-gray-500">링크 복사</span>
            </button>
            <button onclick="shareKakao()" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 rounded-full bg-yellow-400 text-yellow-900 flex items-center justify-center">
                    <i class="fa-regular fa-comment text-xl"></i>
                </div>
                <span class="text-xs text-gray-500">카카오톡</span>
            </button>
            <button onclick="shareFacebook()" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 rounded-full bg-blue-600 text-white flex items-center justify-center">
                    <i class="fa-brands fa-facebook text-xl"></i>
                </div>
                <span class="text-xs text-gray-500">페이스북</span>
            </button>
            <button onclick="shareInstagram()" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 rounded-full text-white flex items-center justify-center"
                    style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888)">
                    <i class="fa-brands fa-instagram text-xl"></i>
                </div>
                <span class="text-xs text-gray-500">인스타그램</span>
            </button>
            <button onclick="shareThreads()" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 rounded-full bg-neutral-800 text-white flex items-center justify-center">
                    <i class="fa-brands fa-threads text-xl"></i>
                </div>
                <span class="text-xs text-gray-500">쓰레드</span>
            </button>
            <button onclick="shareTwitter()" class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 rounded-full bg-black text-white flex items-center justify-center">
                    <i class="fa-brands fa-x-twitter text-xl"></i>
                </div>
                <span class="text-xs text-gray-500">트위터</span>
            </button>
        </div>
    </div>
</div>

<!-- ===================== ERROR SCREEN ===================== -->
<section id="errorScreen" class="hidden w-full min-h-[100dvh] flex flex-col items-center justify-center fade-in">
    <div class="w-full px-8 py-10 text-center">
        <div class="text-5xl mb-4">😢</div>
        <h2 class="text-xl font-bold text-gray-700 mb-2">입장할 수 없어요</h2>
        <p id="errorText" class="text-gray-500 text-sm mb-6">이미 두 명이 참여 중인 방이에요</p>
        <a th:href="@{/}" class="btn-primary block text-white font-bold py-4 px-6 rounded-2xl text-center">
            <i class="fa-solid fa-home mr-2"></i>홈으로 가기
        </a>
    </div>
</section>

</div>

<script th:inline="javascript">
    const ROOM_CODE = /*[[${roomCode}]]*/ '';
    const BASE_URL = /*[[${baseUrl}]]*/ 'http://localhost:8080';
    const ROOM_URL = BASE_URL + '/room/' + ROOM_CODE;
    const PLAYER_KEY = `ogam_${ROOM_CODE}_playerId`;
    const CONTEXT_PATH = /*[[${contextPath}]]*/ '';
</script>
<script th:src="@{/js/room.js}"></script>
</body>
</html>
