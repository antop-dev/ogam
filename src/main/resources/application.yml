spring:
  application:
    name: 0gam
  datasource:
    url: jdbc:sqlite:${app.db-path}?journal_mode=WAL
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
  mvc:
    async:
      request-timeout: -1
  web:
    error:
      include-message: always
      include-stacktrace: never

app:
  db-path: ${DB_PATH:ogam.db}
  base-url: ${BASE_URL:http://localhost:8080}

logging:
  level:
    ia.antop.ogam: DEBUG
