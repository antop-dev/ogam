name: CD

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build JAR
        run: ./gradlew bootJar

      - name: Rename to app.jar
        run: mv build/libs/ogam-*.jar build/libs/app.jar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app.jar
          path: build/libs/app.jar
          retention-days: 1

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app.jar

      - name: Upload JAR to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: app.jar
          target: ${{ secrets.SSH_DEPLOY_DIR }}
          overwrite: true

      - name: Restart application
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DIR                 : ${{ secrets.SSH_DEPLOY_DIR }}
          DB_PATH                    : ${{ secrets.APP_DB_PATH }}
          BASE_URL                   : ${{ secrets.APP_BASE_URL }}
          BOX_ART_ORIGINAL_DIRECTORY : ${{ secrets.APP_BOX_ART_ORIGINAL_DIRECTORY }}
          BOX_ART_THUMBNAIL_DIRECTORY: ${{ secrets.APP_BOX_ART_THUMBNAIL_DIRECTORY }}
          GOOGLE_CLIENT_ID           : ${{ secrets.APP_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET       : ${{ secrets.APP_GOOGLE_CLIENT_SECRET }}
        with:
          host:     ${{ secrets.SSH_HOST }}
          port:     ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: DEPLOY_DIR,DB_PATH,BASE_URL,BOX_ART_ORIGINAL_DIRECTORY,BOX_ART_THUMBNAIL_DIRECTORY,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            PID_FILE="$DEPLOY_DIR/app.pid"

            # 기존 프로세스 종료
            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE")
              if kill -0 "$OLD_PID" 2>/dev/null; then
                echo "Stopping PID $OLD_PID ..."
                kill "$OLD_PID"
                sleep 3
              fi
              rm -f "$PID_FILE"
            fi

            # 새 프로세스 시작
            nohup java -jar \
              -Xmx512m -Xlog:gc -Djava.security.egd=file:/dev/urandom \
              -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=$DEPLOY_DIR/heapdump.hprof -XX:+ExitOnOutOfMemoryError \
              "$DEPLOY_DIR/app.jar" \
              --spring.profiles.active=prd \
              > "$DEPLOY_DIR/app.log" 2>&1 &

            echo $! > "$PID_FILE"
            echo "Started PID $(cat "$PID_FILE")"

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
